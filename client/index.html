<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --primary: #4a90e2;
            --accent: #a855f7;
            --text: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(74, 144, 226, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
            filter: blur(80px);
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        #chat-target {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        .features {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            justify-content: center;
        }

        .feature-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container">
        <h1>Gemini AI Chat</h1>
        <p>Experience the power of Google's Gemini AI with real-time <br>streaming and premium glassmorphism design.</p>
        
        <div id="chat-target">
            <!-- Chat will be injected here -->
             <div style="color: #666; font-size: 0.9rem; padding: 40px;">Initializing secure connection...</div>
        </div>

        <div class="features">
            <span class="feature-tag">✨ Gemini 1.5 Flash</span>
            <span class="feature-tag">🚀 Real-time Streaming</span>
            <span class="feature-tag">🎨 Premium Glassmorphism</span>
        </div>
    </div>

    <script src="/dom-injection.js"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                initDomChat('chat-target');
            }, 500); // Small delay for better intro feel
        });
    </script>
</body>
</html>
